[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SQUARE_ACCESS_TOKEN"
  SECRETS_SCAN_OMIT_PATHS = "public/index.html"
  SECRETS_SCAN_ENABLED = "false"

[functions]
  node_bundler = "esbuild"

[functions."generate-plan"]
  timeout = 30

[functions."generate-image"]
  timeout = 30

[functions."get-portal"]
  timeout = 15

[functions."send-message"]
  timeout = 15

[functions."upload-file"]
  timeout = 30

[functions."list-files"]
  timeout = 15

[functions."get-file"]
  timeout = 15

[functions."submit-referral"]
  timeout = 15

[functions."set-offer"]
  timeout = 15

[functions."generate-prompt"]
  timeout = 30

[functions."process-plan"]
  timeout = 180

[functions."agency-process-plan"]
  timeout = 180

[functions."agency-register"]
  timeout = 15

[functions."agency-login"]
  timeout = 10

[functions."agency-settings"]
  timeout = 10

[functions."agency-public"]
  timeout = 10

[functions."agency-get-clients"]
  timeout = 15

[functions."agency-update-client"]
  timeout = 20

[functions."serve-onboard"]
  timeout = 10

[[redirects]]
  from = "/api/agency/register"
  to = "/.netlify/functions/agency-register"
  status = 200

[[redirects]]
  from = "/api/agency/login"
  to = "/.netlify/functions/agency-login"
  status = 200

[[redirects]]
  from = "/api/agency/settings"
  to = "/.netlify/functions/agency-settings"
  status = 200

[[redirects]]
  from = "/api/agency/public"
  to = "/.netlify/functions/agency-public"
  status = 200

[[redirects]]
  from = "/api/agency/clients"
  to = "/.netlify/functions/agency-get-clients"
  status = 200

[[redirects]]
  from = "/api/agency/update-client"
  to = "/.netlify/functions/agency-update-client"
  status = 200

[[redirects]]
  from = "/api/agency/process-plan"
  to = "/.netlify/functions/agency-process-plan"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, x-agency-token, x-internal-key"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS, GET"
    Access-Control-Allow-Headers = "Content-Type, Authorization, x-internal-key"
